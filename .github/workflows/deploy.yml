name: Deploy Infrastructure Changes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -f -X POST https://habitame.xyz/hooks/deploy \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"service":"infra"}'
