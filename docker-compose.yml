services:
  db:
    image: postgres:16
    container_name: habitame-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/habitame/habitame-api:latest
    container_name: habitame-api
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOAD_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/habitame/habitame-web:latest
    container_name: habitame-web
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: ghcr.io/habitame/habitame-admin:latest
    container_name: habitame-admin
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fs http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # nginx interno: ya NO expone 80/443 ni hace TLS (eso lo hace el edge proxy Traefik).
  # Sigue sirviendo uploads, /slides y estaticos, y enruta web/admin/api por server_name.
  nginx:
    image: nginx:1.27-alpine
    container_name: habitame-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/var/www/uploads:ro
      - ./nginx/static:/var/www/static:ro
    depends_on:
      - web
      - admin
      - api
    networks:
      - habitame_net
      - edge
    labels:
      - traefik.enable=true
      - "traefik.http.routers.habitame.rule=Host(`habitame.xyz`) || Host(`admin.habitame.xyz`) || Host(`api.habitame.xyz`) || Host(`uploads.habitame.xyz`)"
      - traefik.http.routers.habitame.entrypoints=websecure
      - traefik.http.routers.habitame.tls.certresolver=le
      - traefik.http.services.habitame.loadbalancer.server.port=80
      - traefik.docker.network=edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  habitame_net:
    driver: bridge
  edge:
    external: true

volumes:
  pg_data:
  uploads_data:
