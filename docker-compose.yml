services:
  db:
    image: postgres:16
    container_name: habitame-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/habitame/habitame-api:latest
    container_name: habitame-api
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOAD_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/habitame/habitame-web:latest
    container_name: habitame-web
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - habitame_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: habitame-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - web
      - api
    networks:
      - habitame_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  habitame_net:
    driver: bridge

volumes:
  pg_data:
  uploads_data:
  certbot_certs:
  certbot_www:
