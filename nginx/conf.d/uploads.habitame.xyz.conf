# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name uploads.habitame.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Archivos estáticos (uploads)
server {
    listen 443 ssl;
    server_name uploads.habitame.xyz;

    ssl_certificate /etc/letsencrypt/live/habitame.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/habitame.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    root /var/www/uploads;

    location / {
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }
}
