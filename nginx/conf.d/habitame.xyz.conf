# TLS y redireccion http->https los gestiona el edge proxy (Traefik).
# Este server solo escucha :80 interno y sirve el contenido.
server {
    listen 80;
    server_name habitame.xyz www.habitame.xyz;

    resolver 127.0.0.11 valid=10s;

    location /hooks/ {
        proxy_pass http://host.docker.internal:9000/hooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /slides {
        root /var/www/static;
        try_files $uri $uri/ /slides/index.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        set $web_upstream http://habitame-web:4000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
